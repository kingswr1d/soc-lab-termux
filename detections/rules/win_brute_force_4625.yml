title: Windows Brute Force Logon Attempts (Event ID 4625)
id: d1a2b3c4-e5f6-7890-abcd-ef1234567890
status: test
description: Detects multiple failed logon attempts (Event ID 4625) from the same source IP within a short time window, indicating password spraying or brute force attacks.
author: SOC Lab Portfolio
date: 2024-01-15
modified: 2024-01-15
tags:
  - attack.credential_access
  - attack.t1110.001
  - attack.t1110.003
logsource:
  product: windows
  category: security
  definition: 'Requirements: Security Event Log (Event ID 4625) with Audit Failure logon type'
detection:
  selection:
    EventID: 4625
  filter_anon:
    TargetUserName: 'ANONYMOUS LOGON'
  filter_machine:
    TargetUserName|endswith: '$'
  condition: selection and not filter_anon and not filter_machine
  timeframe: 5m
  count: 10
fields:
  - EventID
  - TargetUserName
  - IpAddress
  - LogonType
  - WorkstationName
  - ProcessName
falsepositives:
  - Legitimate user forgetting password
  - Service account with expired password
level: medium
references:
  - https://attack.mitre.org/techniques/T1110/
  - https://www.ultimatewindowssecurity.com/securitylog/encyclopedia/event.aspx?eventid=4625