title: PowerShell Encoded Command Execution
id: e2b3c4d5-f6a7-8901-bcde-f23456789012
status: test
description: Detects PowerShell execution with encoded commands (-EncodedCommand or -e), commonly used for obfuscation and defense evasion.
author: SOC Lab Portfolio
date: 2024-01-15
modified: 2024-01-15
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  product: windows
  category: process_creation
  definition: 'Requires: Sysmon Event ID 1 or Windows Security Event ID 4688 with command line logging enabled'
detection:
  selection_encoded:
    CommandLine|contains:
      - '-EncodedCommand'
      - '-E '
      - '-Enco'
      - '-Encod'
      - '-Encode'
      - '-Encoded'
      - '-EncodedC'
      - '-EncodedCo'
      - '-EncodedCom'
      - '-EncodedCom'
      - '-EncodedComm'
      - '-EncodedComma'
      - '-EncodedCommand'
  selection_base64:
    CommandLine|re: '(-e|-enc|-encodedcommand)\s+[A-Za-z0-9+/]{50,}={0,2}'
  condition: selection_encoded or selection_base64
fields:
  - EventID
  - Image
  - CommandLine
  - ParentImage
  - User
  - ProcessId
  - ParentProcessId
falsepositives:
  - Legitimate administrative scripts using encoded commands
  - Some backup/management software
level: high
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/