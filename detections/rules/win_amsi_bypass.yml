title: PowerShell AMSI Bypass via Reflection or .NET Assembly Manipulation
id: e2b3c4d5-f6a7-8901-bcde-f23456789012
status: test
description: "Detects PowerShell AMSI (Antimalware Scan Interface) bypass attempts using reflection to modify internal AMSI fields (amsiInitFailed, amsiContext) or loading bypass assemblies. Covers common techniques: Set-Field on System.Management.Automation.AmsiUtils, [Ref].Assembly.GetType('System.Management.Automation.AmsiUtils'), and known bypass strings."
author: SOC Lab
date: 2026-06-18
tags:
  - attack.t1562.001
  - attack.defense_evasion
  - detection.amsi
  - detection.powershell
logsource:
  product: windows
  service: powershell
  definition: "Requires: PowerShell Script Block Logging (Event ID 4104) enabled. Group Policy: Turn on PowerShell Script Block Logging."
detection:
  selection_reflection_amsiutils:
    ScriptBlockText|contains:
      - "amsiUtils"
      - "AmsiUtils"
      - "amsiInitFailed"
      - "amsiContext"
  selection_reflection_assembly:
    ScriptBlockText|contains:
      - "[Ref].Assembly.GetType"
      - 'GetField("amsiInitFailed"'
      - 'GetField("amsiContext"'
      - "SetValue($null,$true)"
      - "SetValue($null,1)"
  selection_known_bypasses:
    ScriptBlockText|contains:
      - "AmsiScanBuffer"
      - "AmsiOpenSession"
      - "AmsiCloseSession"
      - "amsi.dll"
      - "System.Management.Automation.AmsiUtils"
  selection_obfuscated_patterns:
    ScriptBlockText|re: '(?i)(a\s*m\s*s\s*i|A\s*M\s*S\s*I).{0,10}(bypass|disable|initfailed|context)'
  condition: 1 of selection_*
falsepositives:
  - "Legitimate security research / red team tooling in controlled environments"
  - "PowerShell scripts that legitimately inspect AMSI state (rare)"
  - "Obfuscated legitimate scripts triggering pattern matching"
level: critical
mitre:
  - T1562.001
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://github.com/SigmaHQ/sigma/tree/master/rules/windows/powershell/powershell_classic_amsi_bypass.yml
  - https://posts.specterops.io/amsi-bypass-powershell-5-0-7b2b3c1e8e5d
  - https://learn.microsoft.com/en-us/windows/win32/amsi/antimalware-scan-interface-portal