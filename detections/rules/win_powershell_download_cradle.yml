title: PowerShell Web Request / Download Cradle
id: b5c6d7e8-f9a0-1234-5678-901234567890
status: test
description: Detects PowerShell download cradles (Invoke-WebRequest, Invoke-Expression, Net.WebClient) used to download and execute payloads in memory.
author: SOC Lab Portfolio
date: 2024-01-15
modified: 2024-01-15
tags:
  - attack.execution
  - attack.t1059.001
  - attack.command_and_control
  - attack.t1105
logsource:
  product: windows
  category: process_creation
  definition: 'Requires: Sysmon Event ID 1 or Windows Security Event ID 4688'
detection:
  selection_webreq:
    Image|endswith: '\powershell.exe'
    CommandLine|contains|all:
      - 'Invoke-WebRequest'
      - 'Invoke-Expression'
  selection_webclient:
    Image|endswith: '\powershell.exe'
    CommandLine|contains|all:
      - 'Net.WebClient'
      - 'DownloadString'
  selection_iex:
    Image|endswith: '\powershell.exe'
    CommandLine|re: 'IEX\s*\(.*(DownloadString|DownloadFile|OpenRead)'
  selection_curl:
    Image|endswith: '\powershell.exe'
    CommandLine|contains|all:
      - 'curl.exe'
      - 'IEX'
  condition: selection_webreq or selection_webclient or selection_iex or selection_curl
fields:
  - EventID
  - Image
  - CommandLine
  - ParentImage
  - User
  - ProcessId
falsepositives:
  - Administrative scripts downloading updates/configs
  - Some DevOps/CI tools
level: high
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1105/
  - https://blog.malwarebytes.com/threat-analysis/2017/03/new-powershell-download-cradles/