title: LOLBin Execution - Certutil Download
id: a4b5c6d7-e8f9-0123-4567-890123456789
status: test
description: Detects certutil.exe used to download files from the internet, a common LOLBin technique for defense evasion and command & control.
author: SOC Lab Portfolio
date: 2024-01-15
modified: 2024-01-15
tags:
  - attack.defense_evasion
  - attack.t1105
  - attack.command_and_control
  - attack.t1059.001
logsource:
  product: windows
  category: process_creation
  definition: 'Requires: Sysmon Event ID 1 or Windows Security Event ID 4688'
detection:
  selection:
    Image|endswith: '\certutil.exe'
    CommandLine|contains|all:
      - '-urlcache'
      - '-split'
      - '-f'
  condition: selection
fields:
  - EventID
  - Image
  - CommandLine
  - ParentImage
  - User
  - ProcessId
falsepositives:
  - Legitimate certificate management operations (rare with these exact flags)
level: high
references:
  - https://attack.mitre.org/techniques/T1105/
  - https://lolbas-project.github.io/lolbas/Binaries/Certutil/