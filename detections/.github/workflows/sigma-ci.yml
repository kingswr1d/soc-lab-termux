name: Sigma Rule CI

on:
  push:
    branches: [main, master]
    paths:
      - 'detections/rules/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'detections/rules/**'

jobs:
  validate:
    name: Validate Sigma Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sigma-cli
        run: |
          pip install --upgrade pip
          pip install sigma-cli==2.5.0

      - name: Validate all Sigma rules (syntax check)
        run: |
          echo "Validating Sigma rule syntax..."
          for rule in detections/rules/*.yml; do
            echo "Checking $rule..."
            sigma validate --format yaml "$rule" || exit 1
          done
          echo "All rules passed syntax validation!"

      - name: Convert rules to Splunk/Elastic/KQL (format test)
        run: |
          echo "Testing rule conversion to multiple formats..."
          for rule in detections/rules/*.yml; do
            echo "Converting $rule to Splunk..."
            sigma convert -t splunk "$rule" > /dev/null || exit 1
            echo "Converting $rule to Elastic..."
            sigma convert -t elastic "$rule" > /dev/null || exit 1
            echo "Converting $rule to KQL..."
            sigma convert -t kql "$rule" > /dev/null || exit 1
          done
          echo "All rules convert successfully to Splunk, Elastic, and KQL!"

  test:
    name: Test Rules Against Logs
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sigma-cli and sigma-vector
        run: |
          pip install --upgrade pip
          pip install sigma-cli==2.5.0 sigma-vector==0.1.0

      - name: Test brute force rule
        run: |
          echo "Testing win_brute_force_4625.yml against test logs..."
          sigma convert -t splunk detections/rules/win_brute_force_4625.yml > /tmp/brute_force.splunk
          sigma-vector --rule detections/rules/win_brute_force_4625.yml --logs detections/test_logs/win_brute_force_4625.json --format json || echo "Expected: rule should trigger on brute force logs"

      - name: Test encoded command rule
        run: |
          echo "Testing win_powershell_encoded_command.yml..."
          sigma-vector --rule detections/rules/win_powershell_encoded_command.yml --logs detections/test_logs/win_powershell_encoded_command.json --format json || echo "Expected: rule should trigger"

      - name: Test scheduled task rule
        run: |
          echo "Testing win_scheduled_task_creation.yml..."
          sigma-vector --rule detections/rules/win_scheduled_task_creation.yml --logs detections/test_logs/win_scheduled_task_creation.json --format json || echo "Expected: rule should trigger"

      - name: Test certutil LOLBin rule
        run: |
          echo "Testing win_lolbin_certutil_download.yml..."
          sigma-vector --rule detections/rules/win_lolbin_certutil_download.yml --logs detections/test_logs/win_lolbin_certutil_download.json --format json || echo "Expected: rule should trigger"

      - name: Test download cradle rule
        run: |
          echo "Testing win_powershell_download_cradle.yml..."
          sigma-vector --rule detections/rules/win_powershell_download_cradle.yml --logs detections/test_logs/win_powershell_download_cradle.json --format json || echo "Expected: rule should trigger"

      - name: Verify benign controls don't trigger
        run: |
          echo "Verifying benign controls don't trigger false positives..."
          for rule in detections/rules/*.yml; do
            echo "Testing $rule against benign controls..."
            if sigma-vector --rule "$rule" --logs detections/test_logs/benign_controls.json --format json 2>/dev/null | grep -q "matches"; then
              echo "WARNING: $rule triggered on benign controls!"
            else
              echo "  OK: No false positives"
            fi
          done

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: always()
    steps:
      - name: Print results
        run: |
          echo "=== Sigma Rule CI Summary ==="
          echo "Validation: ${{ needs.validate.result }}"
          echo "Testing: ${{ needs.test.result }}"
          if [ "${{ needs.validate.result }}" = "success" ] && [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "❌ Some checks failed"
            exit 1
          fi