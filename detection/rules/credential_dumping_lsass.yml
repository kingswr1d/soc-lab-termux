title: Credential Dumping via LSASS Memory Access
id: 8f3d2c9b-6a7f-4e1a-9c7b-d4f8a2e0b1c2
status: test
description: Detects tools and techniques used to dump LSASS memory for credential extraction
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.001/T1003.001.md
author: soc-lab
date: 2024-01-15
modified: 2024-01-15
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_tools:
        Image|endswith:
            - '\mimikatz.exe'
            - '\sekurlsa.exe'
            - '\lsassy.exe'
            - '\gsecdump.exe'
            - '\pwdumpx.exe'
            - '\cachedump.exe'
        CommandLine|contains:
            - 'mimikatz'
            - 'sekurlsa::logonpasswords'
            - 'lsadump::sam'
            - 'sekurlsa::minidump'
    selection_procdump:
        Image|endswith: '\procdump.exe'
        CommandLine|contains:
            - 'lsass'
            - '-ma'
            - '-r'
    selection_comsvcs:
        Image|endswith: '\comsvcs.dll'
        CommandLine|contains:
            - 'MiniDump'
            - 'lsass'
    selection_rundll32:
        Image|endswith: '\rundll32.exe'
        CommandLine|contains:
            - 'comsvcs.dll'
            - 'MiniDump'
    selection_taskmgr:
        Image|endswith: '\taskmgr.exe'
        CommandLine|contains: 'lsass'
    selection_sqltools:
        Image|endswith:
            - '\sqldumper.exe'
            - '\sqlservr.exe'
        CommandLine|contains: 'lsass'
    condition: 1 of selection_*
falsepositives:
    - Legitimate debugging of LSASS by administrators
    - Crash dump generation for troubleshooting
level: high